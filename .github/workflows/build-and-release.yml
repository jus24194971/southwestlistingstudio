name: Build and Release

# Triggers:
#   - Push a tag like v0.2.1: builds a Windows .exe and publishes a GitHub Release
#   - workflow_dispatch: manually trigger from the Actions tab (useful for testing)
#
# To release a new version:
#   1. Bump version in listing_studio/__init__.py
#   2. git commit -am "Release v0.2.1"
#   3. git tag v0.2.1
#   4. git push && git push --tags
#
# About 5 minutes later the release will be live and Dad's app will pick it up
# the next time he opens it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,windows]"
          pip install pyinstaller

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # Extract version from __init__.py
          $initContent = Get-Content "listing_studio/__init__.py" -Raw
          if ($initContent -match '__version__ = "([^"]+)"') {
            $pkgVersion = $matches[1]
          } else {
            Write-Error "Could not find __version__ in __init__.py"
            exit 1
          }

          # Strip 'v' prefix from tag
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')

          Write-Host "Tag version: $tagVersion"
          Write-Host "Package version: $pkgVersion"

          if ($pkgVersion -ne $tagVersion) {
            Write-Error "Version mismatch: tag is $tagVersion but __init__.py says $pkgVersion. Bump the version before tagging."
            exit 1
          }

      - name: Run PyInstaller
        run: pyinstaller listing_studio.spec --clean --noconfirm

      - name: Verify .exe was built
        shell: pwsh
        run: |
          $exePath = "dist/ListingStudio/ListingStudio.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error ".exe not found at expected path: $exePath"
            exit 1
          }
          $size = (Get-Item $exePath).Length
          Write-Host "Built .exe: $exePath ($size bytes)"

      - name: Package into zip
        shell: pwsh
        run: |
          # Zip the entire dist/ListingStudio/ folder for distribution
          $tagName = "${{ github.ref_name }}"
          if (-not $tagName.StartsWith("v")) {
            # workflow_dispatch from a non-tag - use commit SHA
            $tagName = "build-${{ github.sha }}".Substring(0, 14)
          }
          $zipName = "ListingStudio-$tagName-windows.zip"
          Compress-Archive -Path "dist/ListingStudio" -DestinationPath $zipName
          Write-Host "Created $zipName"
          # Save for the next step
          "ZIP_PATH=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload zip as workflow artifact
        # Always upload so we can inspect builds even without a tag
        uses: actions/upload-artifact@v4
        with:
          name: listing-studio-windows
          path: ${{ env.ZIP_PATH }}
          retention-days: 14

      - name: Create GitHub Release
        # Only when triggered by a tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          # The tag's annotation becomes the release body; if it's a lightweight
          # tag, GitHub will use the commit message instead.
          generate_release_notes: true
          # Set to true if you want releases to start as drafts (review before publish)
          draft: false
          # Set to true for prereleases (won't be auto-installed by users)
          prerelease: false
